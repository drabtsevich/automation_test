apiVersion: batch/v1
kind: Job
metadata:
  name: tests-api
  labels:
    app: tests-automation
    suite: api
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: tests-automation
        suite: api
    spec:
      restartPolicy: Never
      containers:
        - name: tests
          image: tests_automation:k8s
          imagePullPolicy: IfNotPresent
          command:
            - pytest
            - tests_api
            - -o
            - "addopts=--alluredir=allure-results --clean-alluredir"
