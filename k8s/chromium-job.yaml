apiVersion: batch/v1
kind: Job
metadata:
  name: tests-chromium
  labels:
    app: tests-automation
    browser: chromium
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: tests-automation
        browser: chromium
    spec:
      restartPolicy: Never
      containers:
        - name: tests
          image: tests_automation:k8s
          imagePullPolicy: IfNotPresent
          command:
            - pytest
            - -o
            - "addopts=--alluredir=allure-results --clean-alluredir --browser chromium"
